run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - nilerr
    - prealloc
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/syedsumx/openvcc
  revive:
    rules:
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: exported

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
